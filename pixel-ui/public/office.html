<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Johns Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a}
#app{display:flex;width:100vw;height:100vh}
#cv-col{flex:1;position:relative;overflow:hidden;background:#0d0d1a}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;
  position:absolute;top:0;left:0;width:100%;height:100%}
#sidebar{width:272px;min-width:272px;display:flex;flex-direction:column;
  background:#070712;border-left:2px solid #1a0a2e;overflow:hidden;
  font-family:'Courier New',monospace}
#hdr{padding:12px 14px 10px;background:linear-gradient(135deg,#0d0020,#1a0035);
  border-bottom:2px solid #e94560}
#hdr-title{font-size:9px;color:#e94560;letter-spacing:3px;font-weight:bold;
  text-transform:uppercase;text-shadow:0 0 12px #e94560}
#hdr-sub{font-size:10px;color:#3a3a5a;margin-top:3px;letter-spacing:1px}
#conn-row{display:flex;align-items:center;gap:6px;margin-top:7px}
#cdot{width:7px;height:7px;border-radius:50%;background:#1a1a1a;transition:all .4s;flex-shrink:0}
#cdot.on{background:#00ff88;box-shadow:0 0 8px #00ff88}
#ctxt{font-size:10px;color:#333;letter-spacing:1px}
#alist{flex:1;overflow-y:auto;padding:6px 5px 8px;scrollbar-width:thin;scrollbar-color:#1a0a3a transparent}
#alist::-webkit-scrollbar{width:3px}
#alist::-webkit-scrollbar-thumb{background:#1a0a3a}
.grp{font-size:8px;color:#666;letter-spacing:2.5px;padding:8px 7px 4px;text-transform:uppercase;
  border-bottom:1px solid #13132a;margin:4px 2px 4px;display:flex;align-items:center;gap:6px}
.grp:first-child{margin-top:0}
.grp::before{content:'';width:4px;height:4px;background:var(--c,#e94560);flex-shrink:0;
  box-shadow:0 0 6px var(--c,#e94560)}
.grp-c{color:#444;font-size:8px;margin-left:auto;letter-spacing:1px}
.ac{background:#06060f;border:1px solid #0f0f2a;border-radius:3px;
  margin:0 2px 4px;padding:7px 9px 7px 12px;position:relative;overflow:hidden;
  transition:border-color .15s,background .15s}
.ac::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--c,#444);transition:opacity .2s;opacity:.35}
.ac.on{border-color:var(--c,#444);background:#0a0a18}
.ac.on::before{opacity:1}
.an{font-size:10px;font-weight:bold;color:var(--c,#aaa);letter-spacing:.5px;
  display:flex;align-items:center;gap:5px}
.an-e{font-size:11px}
.at{font-size:9px;color:#4a4a6a;margin-top:3px;line-height:1.4;
  max-height:26px;overflow:hidden;font-style:italic}
.ac.on .at{color:#7a7a9a}
.as{display:flex;align-items:center;gap:5px;margin-top:4px}
.ad{width:5px;height:5px;border-radius:50%;background:#111;flex-shrink:0;transition:all .3s}
.ad.work{background:#ffcc00;box-shadow:0 0 4px #ffcc00}
.ad.talk{background:#00ff88;box-shadow:0 0 4px #00ff88}
.ad.use_tool{background:#4fc3f7;box-shadow:0 0 4px #4fc3f7}
.aa{font-size:8px;color:#333;letter-spacing:1.2px;text-transform:uppercase}
.ac.on .aa{color:var(--c,#888)}
.ac.focus{outline:1px solid var(--c,#e94560);outline-offset:-1px;
  box-shadow:0 0 10px rgba(233,69,96,.25) inset}
.ac{cursor:pointer}
#feed{height:155px;border-top:1px solid #0f0f2a;display:flex;flex-direction:column;flex-shrink:0}
#fhdr{padding:5px 10px;font-size:9px;color:#222;background:#04040c;
  letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #0a0a18}
#flog{flex:1;overflow-y:auto;padding:5px 9px;font-size:10px;line-height:1.65;
  scrollbar-width:thin;scrollbar-color:#0f0a2a transparent}
#flog::-webkit-scrollbar{width:3px}
.fm .fw{font-weight:bold}.fm .fx{color:#555}
#sbar{padding:4px 10px;background:#030308;font-size:9px;color:#1a1a3a;
  border-top:1px solid #08080f;display:flex;justify-content:space-between;flex-shrink:0}
#active{color:#e94560;font-weight:bold}

/* Tabbed lower panel: Feed | Proposals | Portfolio */
#tabs{display:flex;border-top:1px solid #0f0f2a;background:#04040c;flex-shrink:0}
.tab{flex:1;padding:6px 4px;font-size:9px;color:#444;letter-spacing:1.5px;
  text-align:center;cursor:pointer;text-transform:uppercase;
  border-right:1px solid #0a0a18;transition:background .15s,color .15s}
.tab:last-child{border-right:none}
.tab:hover{color:#888;background:#08081a}
.tab.on{color:#e94560;background:#0a0a18;box-shadow:inset 0 2px 0 #e94560}
.tab .badge{display:inline-block;margin-left:4px;background:#e94560;color:#fff;
  font-size:8px;padding:1px 4px;border-radius:6px;min-width:14px}
.tab .badge.zero{display:none}
.panel{display:none;flex:1;overflow-y:auto;padding:5px 9px;font-size:10px;line-height:1.55;
  scrollbar-width:thin;scrollbar-color:#0f0a2a transparent}
.panel::-webkit-scrollbar{width:3px}
.panel.on{display:block}
.panel.empty{color:#333;font-style:italic;padding:18px 12px;text-align:center;font-size:9px}

/* Proposal cards */
.prop{background:#0a0a18;border:1px solid #1a0a3a;border-left:3px solid #ffcc00;
  padding:7px 8px;margin:0 0 6px;border-radius:2px}
.prop-h{font-size:9px;color:#ffcc00;letter-spacing:1px;text-transform:uppercase;
  display:flex;justify-content:space-between;margin-bottom:4px}
.prop-by{color:#888;font-size:9px}
.prop-r{font-size:10px;color:#aaa;margin:3px 0 6px;line-height:1.45}
.prop-p{font-size:9px;color:#555;font-family:'Courier New',monospace;
  background:#020208;padding:4px 6px;margin:4px 0 6px;border-radius:2px;
  white-space:pre-wrap;word-break:break-all;max-height:55px;overflow:hidden}
.prop-btns{display:flex;gap:4px;margin-top:5px}
.prop-btn{flex:1;padding:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  border:none;cursor:pointer;font-family:'Courier New',monospace;border-radius:2px}
.prop-btn.ok{background:#1a4d2e;color:#7ee787}
.prop-btn.ok:hover{background:#246a3f}
.prop-btn.no{background:#4d1a1a;color:#ff8888}
.prop-btn.no:hover{background:#6a2424}

/* Portfolio cards */
.port{background:#06060f;border:1px solid #0f0f2a;border-left:3px solid #4fc3f7;
  padding:7px 9px;margin:0 0 5px;border-radius:2px}
.port-t{font-size:10px;color:#8ac6ff;font-weight:bold;letter-spacing:.3px;margin-bottom:3px}
.port-d{font-size:9px;color:#5a6a8a;line-height:1.4}

/* Chat input */
#chat-row{display:flex;border-top:1px solid #0f0f2a;background:#04040c;flex-shrink:0}
#chat-in{flex:1;background:#06060f;border:none;padding:7px 9px;color:#bbb;
  font-family:'Courier New',monospace;font-size:11px;outline:none}
#chat-in:focus{background:#0a0a18}
#chat-in::placeholder{color:#222}
#chat-send{padding:0 12px;background:#1a0035;color:#e94560;border:none;cursor:pointer;
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
#chat-send:hover{background:#2a0050;color:#ff6b88}

/* Header evolution button */
#evo{margin-top:6px;padding:5px 8px;background:#1a0035;color:#aa88ff;border:none;
  cursor:pointer;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;border-radius:2px;width:100%;transition:background .15s}
#evo:hover{background:#2a0066;color:#cc99ff}
#evo:disabled{opacity:.4;cursor:wait}

/* Floating panels (ported from root prototype as vanilla JS) */
.fp{position:absolute;background:#0a0a18ee;border:2px solid #1a1a3a;border-radius:3px;
  font-family:'Courier New',monospace;color:#bbb;
  box-shadow:0 4px 16px rgba(0,0,0,.6);overflow:hidden;
  display:flex;flex-direction:column;backdrop-filter:blur(2px)}
.fp-head{display:flex;justify-content:space-between;align-items:center;
  padding:5px 8px;background:#04040c;border-bottom:1px solid var(--accent,#e94560);
  cursor:move;user-select:none}
.fp-title{display:flex;gap:6px;align-items:center;font-size:9px;letter-spacing:1.5px;
  color:var(--accent,#e94560);text-transform:uppercase}
.fp-icon{font-size:11px}
.fp-actions{display:flex;gap:3px}
.fp-btn{background:transparent;border:1px solid #2a2a4a;color:#888;width:18px;height:18px;
  cursor:pointer;font-family:'Courier New',monospace;font-size:11px;line-height:1;
  display:flex;align-items:center;justify-content:center;padding:0;border-radius:2px}
.fp-btn:hover{border-color:var(--accent,#e94560);color:var(--accent,#e94560)}
.fp-body{flex:1;overflow-y:auto;padding:8px 10px;font-size:10px;line-height:1.5;
  scrollbar-width:thin;scrollbar-color:#1a1a3a transparent;max-height:65vh}
.fp-body::-webkit-scrollbar{width:4px}
.fp-body.min{display:none}

/* Toolbar (panel chips) */
#tb{position:absolute;top:8px;left:8px;display:flex;gap:4px;z-index:50;
  font-family:'Courier New',monospace}
.chip{background:#0a0a18cc;border:1px solid #1a1a3a;color:#666;padding:5px 9px;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  border-radius:2px;transition:color .15s,border-color .15s}
.chip:hover{color:#aaa;border-color:#3a3a5a}
.chip.on{color:var(--c,#e94560);border-color:var(--c,#e94560);
  box-shadow:0 0 8px rgba(233,69,96,.3)}

/* Genesis panel — meta evolution feature */
.gen-section{border-bottom:1px solid #1a1a3a;padding:0 0 8px;margin:0 0 8px}
.gen-section:last-child{border:none}
.gen-h{font-size:9px;color:#aa88ff;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.gen-charter{background:#06060f;border-left:2px solid #aa88ff;padding:6px 8px;
  font-size:10px;color:#9999bb;font-style:italic;line-height:1.5;margin-bottom:6px}
.gen-pause{display:flex;align-items:center;gap:6px;font-size:10px;color:#888;cursor:pointer;margin-top:4px}
.gen-pause input{margin:0;cursor:pointer}
.gen-stat{display:flex;justify-content:space-between;font-size:9px;color:#666;
  padding:3px 0;border-bottom:1px dashed #1a1a3a}
.gen-stat:last-child{border:none}
.gen-stat b{color:#aaa;font-weight:normal}
.gen-vote{margin:4px 0;font-size:9px;color:#666;line-height:1.4}
.gen-vote .by{color:#aaa}
.gen-vote .yea{color:#7ee787}
.gen-vote .nay{color:#ff8888}
.gen-hist{font-size:9px;color:#666;padding:3px 0;border-bottom:1px dashed #1a1a3a;
  display:flex;justify-content:space-between;gap:8px;align-items:start}
.gen-hist .h-t{color:#aaa;flex:1;line-height:1.4;word-break:break-word}
.gen-hist .h-r{background:#4d1a1a;color:#ff8888;border:none;cursor:pointer;
  font-size:8px;padding:2px 5px;font-family:'Courier New',monospace;border-radius:2px}
.gen-hist .h-r:hover{background:#6a2424}
.gen-hist .h-r.done{background:#1a4d2e;color:#7ee787;cursor:default}

/* Agent inspector panel */
.ai-name{font-size:14px;color:var(--c,#e94560);font-weight:bold;letter-spacing:1px;margin-bottom:4px}
.ai-role{font-size:9px;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.ai-row{font-size:9px;color:#666;display:flex;justify-content:space-between;padding:2px 0}
.ai-row b{color:#aaa;font-weight:normal}
.ai-section{margin-top:8px;padding-top:6px;border-top:1px dashed #1a1a3a}
.ai-list{font-size:9px;color:#888;line-height:1.5;max-height:140px;overflow-y:auto}
.ai-list li{margin-left:12px;padding:1px 0}
</style>
</head>
<body>
<div id="app">
  <div id="cv-col">
    <canvas id="c"></canvas>
    <div id="tb">
      <div class="chip" data-pn="inspector" style="--c:#4fc3f7">🔍 Inspector</div>
      <div class="chip" data-pn="genesis" style="--c:#aa88ff">🧬 Genesis</div>
    </div>
  </div>
  <div id="sidebar">
    <div id="hdr">
      <div id="hdr-title">⚡ Johns Command Center</div>
      <div id="hdr-sub">12 AGENTS · PIXEL OFFICE</div>
      <div id="conn-row"><div id="cdot"></div><span id="ctxt">Connecting...</span></div>
      <button id="evo" title="Ask every agent to look around and propose one improvement">✨ Spark Evolution</button>
    </div>
    <div id="alist"></div>
    <div id="tabs">
      <div class="tab on" data-tab="feed">Feed</div>
      <div class="tab" data-tab="proposals">Proposals<span class="badge zero" id="prop-badge">0</span></div>
      <div class="tab" data-tab="portfolio">Portfolio</div>
    </div>
    <div id="panel-feed" class="panel on" style="height:155px"></div>
    <div id="panel-proposals" class="panel empty" style="height:155px">No pending proposals.<br><br>Click ✨ Spark Evolution to ask agents to suggest improvements.</div>
    <div id="panel-portfolio" class="panel empty" style="height:155px">Loading portfolio...</div>
    <div id="chat-row">
      <input id="chat-in" type="text" placeholder="Tell the office something..." maxlength="500">
      <button id="chat-send">Send</button>
    </div>
    <div id="sbar"><span><span id="active">0</span> active</span><span id="tk">⏱ 0</span></div>
  </div>
</div>
<script>
// ── Constants (matching pixel-agents exactly) ─────────────────────────────────
const TILE = 16;          // world tile size in pixels
const ZOOM = 3;           // render scale (3x = 48px tiles)
const S = TILE * ZOOM;    // 48px — one tile on screen

// Character sprite constants from pixel-agents/shared/assets/constants.ts
const CHAR_W = 16;        // sprite frame width
const CHAR_H = 32;        // sprite frame height (NOT 16!)
const FRAMES_PER_ROW = 7; // 7 animation frames per direction
// Direction rows in sprite sheet
const DIR_DOWN  = 0;
const DIR_UP    = 1;
const DIR_RIGHT = 2;
// Left = flip of right row

const COLS = 24, ROWS = 20;

// WebSocket URL — auto-detects host so the office can be opened from any
// device on your LAN (phone, other laptop) when you access it via
// http://<your-mac-ip>:5174/office.html. Override with ?ws=ws://host:port
function resolveWsUrl() {
  const params = new URLSearchParams(window.location.search);
  const override = params.get('ws');
  if (override) return override;
  // Default: same host as the page, port 3000 (Colyseus server)
  const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const host = window.location.hostname || 'localhost';
  return `${scheme}://${host}:3000`;
}
const WS = resolveWsUrl();

// 12 agents — 4×3 grid, evenly spaced
// Cols 4/9/14/19 — 5-tile spacing, desks (3 wide) don't touch walls
// Rows 3/9/15 — 6-tile spacing: row N agent standing, N+1/N+2 desk, N+3..N+5 walkway
// si = sprite sheet index (char_0..char_5) — grouped so row-mates have different skins
const DEFS = [
  // Row 1 — Strategic / leadership
  {id:'atlas',    name:'Atlas',    emoji:'📅',color:'#ce93d8',col:4, row:3, si:3, group:'Strategy'},
  {id:'scholar',  name:'Scholar',  emoji:'🎓',color:'#4fc3f7',col:9, row:3, si:0, group:'Strategy'},
  {id:'research', name:'Research', emoji:'🔬',color:'#ffb74d',col:14,row:3, si:2, group:'Strategy'},
  {id:'knowledge',name:'Knowledge',emoji:'📚',color:'#ffe082',col:19,row:3, si:4, group:'Strategy'},
  // Row 2 — Business operations
  {id:'biz',      name:'Biz',      emoji:'💼',color:'#81c784',col:4, row:9, si:1, group:'Business'},
  {id:'finance',  name:'Finance',  emoji:'💰',color:'#f48fb1',col:9, row:9, si:4, group:'Business'},
  {id:'comms',    name:'Comms',    emoji:'✉',color:'#90caf9',col:14,row:9, si:3, group:'Business'},
  {id:'social',   name:'Social',   emoji:'📣',color:'#fff176',col:19,row:9, si:0, group:'Business'},
  // Row 3 — Wellness / systems
  {id:'exercise', name:'Exercise', emoji:'💪',color:'#80cbc4',col:4, row:15,si:5, group:'Wellness'},
  {id:'nutrition',name:'Nutrition',emoji:'🍽',color:'#a5d6a7',col:9, row:15,si:1, group:'Wellness'},
  {id:'mental',   name:'Mental',   emoji:'🧠',color:'#ef9a9a',col:14,row:15,si:2, group:'Wellness'},
  {id:'it',       name:'IT',       emoji:'💻',color:'#b0bec5',col:19,row:15,si:5, group:'Wellness'},
];

// Agent runtime state
// World coords: x,y in pixels (not tiles). Anchor = bottom-center.
const agents = {};
DEFS.forEach(d => {
  // Anchor bottom-center at tile center
  const wx = d.col * TILE + TILE / 2;
  const wy = d.row * TILE + TILE;  // bottom of tile
  agents[d.id] = {
    ...d,
    // World pixel positions
    wx, wy,        // current (world)
    tx: wx, ty: wy, // target (world)
    deskX: wx, deskY: wy, // home desk position (to return to)
    action: 'idle', thought: '...', busy: false,
    // Animation
    frame: 1, frameTimer: 0,
    walkStep: 0,
    dir: DIR_DOWN,
    flip: false,
    // Wander behavior (Pokemon-style NPC wandering)
    wanderTimer: 0, // fire on first frame so agents start walking immediately
    wanderCount: 0,
    wanderLimit: 6 + Math.floor(Math.random() * 5), // 6-10 moves before rest
    pausedAt: 0, // time still standing
    purpose: null, // 'visit' | 'break' | 'roam' | 'rest' | null
    visiting: null, // buddy id if visiting
    chatMsg: null, // ephemeral message
    chatTimer: 0,
    // Idle bob
    bobPhase: Math.random() * Math.PI * 2,
  };
});

// Walkable tile set — all tiles except walls and furniture
// Furniture blocked tiles — precomputed once
const BLOCKED = new Set();
function blockTile(c, r) { BLOCKED.add(c + ',' + r); }
// Walls
for (let c = 0; c < COLS; c++) { blockTile(c, 0); blockTile(c, ROWS-1); }
for (let r = 0; r < ROWS; r++) { blockTile(0, r); blockTile(COLS-1, r); }
// Desks (3×2) + PCs for each agent
DEFS.forEach(d => {
  for (let dc = -1; dc <= 1; dc++) {
    blockTile(d.col + dc, d.row + 1);
    blockTile(d.col + dc, d.row + 2);
  }
});
// Break area: sofas, ctable, side chairs, flanking plants
[[9,12],[10,12],[13,12],[14,12],[11,13],[12,13],
 [8,13],[15,13],[8,12],[15,12]].forEach(([c,r]) => blockTile(c,r));
// Left/right wall columns: bookshelves, cactus, coffee, large plants, bins
[[1,6],[1,7],[1,12],[1,17],[22,6],[22,7],[22,12],[22,17],
 [2,18],[21,18],[4,18],[19,18]].forEach(([c,r]) => blockTile(c,r));
// Whiteboard
blockTile(1, 2);

function isWalkable(col, row) {
  if (col < 1 || row < 1 || col >= COLS-1 || row >= ROWS-1) return false;
  return !BLOCKED.has(col + ',' + row);
}

// Relationship map — who visits whom (from context-bible.md inter-agent rules)
const BUDDIES = {
  atlas:     ['scholar','biz','finance','mental','exercise','social','comms'], // orchestrator
  mental:    ['atlas','scholar','exercise','nutrition'], // circuit breaker
  it:        ['knowledge','social','biz','research'], // weekly audits
  exercise:  ['nutrition','mental'],
  nutrition: ['exercise','scholar'],
  biz:       ['finance','social','comms'],
  finance:   ['biz','research','atlas'],
  research:  ['scholar','finance','knowledge'],
  scholar:   ['atlas','knowledge','research'],
  social:    ['comms','biz','it'],
  comms:     ['social','biz','atlas'],
  knowledge: ['research','scholar','it'],
};

// Break area — middle sofa zone (agents gather here for "coffee")
const BREAK_SPOTS = [
  {col: 8, row: 13}, {col: 11, row: 14}, {col: 12, row: 14}, {col: 15, row: 13},
];

// Find a walkable tile adjacent to a target tile (for "visiting" someone's desk)
function adjacentWalkable(col, row) {
  const candidates = [[col-2,row],[col+2,row],[col,row-1],[col-1,row-1],[col+1,row-1]];
  for (const [c, r] of candidates) if (isWalkable(c, r)) return { col: c, row: r };
  return null;
}

// Pick a wander target with purpose:
//   35% visit a buddy agent's desk area (across the whole office)
//   20% hang out in the break area
//   15% take a stroll to one of the far corners / points of interest
//   30% roam anywhere on the floor
function pickWanderTarget(agent) {
  const roll = Math.random();

  if (roll < 0.35) {
    // Visit a buddy
    const buddies = BUDDIES[agent.id] || [];
    if (buddies.length) {
      const targetId = buddies[Math.floor(Math.random() * buddies.length)];
      const target = agents[targetId];
      if (target) {
        const spot = adjacentWalkable(target.col, target.row);
        if (spot) {
          return {
            tx: spot.col * TILE + TILE / 2,
            ty: spot.row * TILE + TILE,
            purpose: 'visit', visiting: targetId,
          };
        }
      }
    }
  } else if (roll < 0.55) {
    // Break area
    const spot = BREAK_SPOTS[Math.floor(Math.random() * BREAK_SPOTS.length)];
    if (isWalkable(spot.col, spot.row)) {
      return {
        tx: spot.col * TILE + TILE / 2,
        ty: spot.row * TILE + TILE,
        purpose: 'break',
      };
    }
  } else if (roll < 0.70) {
    // Take a stroll to a landmark — coffee, whiteboard, plant corners, doormat
    const landmarks = [
      {col: 21, row: 13}, // coffee machine
      {col: 2,  row: 2},  // whiteboard
      {col: 2,  row: 18}, // bottom-left plant
      {col: 21, row: 18}, // bottom-right plant
      {col: 11, row: 18}, // entrance doormat
      {col: 12, row: 18},
      {col: 2,  row: 8},  // left-side bookshelf corridor
      {col: 21, row: 8},  // right-side bookshelf corridor
    ];
    const spot = landmarks[Math.floor(Math.random() * landmarks.length)];
    const adj = isWalkable(spot.col, spot.row) ? spot : adjacentWalkable(spot.col, spot.row);
    if (adj) {
      return {
        tx: adj.col * TILE + TILE / 2,
        ty: adj.row * TILE + TILE,
        purpose: 'stroll',
      };
    }
  }

  // Roam ANYWHERE on the office floor (was previously ±2 tiles from desk).
  // Pick random walkable tiles across the whole grid so agents actually
  // traverse the full space.
  for (let tries = 0; tries < 40; tries++) {
    const col = 1 + Math.floor(Math.random() * (COLS - 2));
    const row = 1 + Math.floor(Math.random() * (ROWS - 2));
    if (isWalkable(col, row)) {
      return {
        tx: col * TILE + TILE / 2,
        ty: row * TILE + TILE,
        purpose: 'roam',
      };
    }
  }
  return { tx: agent.deskX, ty: agent.deskY, purpose: 'rest' };
}

// Meeting events — every 30-60s, randomly summon 3-5 buddies to either the
// whiteboard (row 1) or the break area for a brief huddle.
const MEETING_SPOTS = [
  { name: 'whiteboard', col: 3, row: 2, radius: 2 },
  { name: 'break',      col: 11, row: 13, radius: 2 },
  { name: 'coffee',     col: 20, row: 12, radius: 2 },
];
let meetingCooldown = 6 + Math.random() * 4; // first huddle in 6-10s
function tryStartMeeting(dt) {
  meetingCooldown -= dt;
  if (meetingCooldown > 0) return;
  meetingCooldown = 18 + Math.random() * 22;
  const spot = MEETING_SPOTS[Math.floor(Math.random() * MEETING_SPOTS.length)];
  // Pick a random "host" agent and 2-3 of their buddies
  const hostId = DEFS[Math.floor(Math.random() * DEFS.length)].id;
  const buddies = (BUDDIES[hostId] || []).slice();
  const attendees = [hostId];
  while (attendees.length < 3 + Math.floor(Math.random() * 2) && buddies.length) {
    const idx = Math.floor(Math.random() * buddies.length);
    attendees.push(buddies.splice(idx, 1)[0]);
  }
  attendees.forEach((id, i) => {
    const a = agents[id];
    if (!a || a.busy) return;
    // Spread them out around the meeting spot
    const angle = (i / attendees.length) * Math.PI * 2;
    const dc = Math.round(Math.cos(angle) * spot.radius);
    const dr = Math.round(Math.sin(angle) * spot.radius);
    let col = spot.col + dc, row = spot.row + dr;
    if (!isWalkable(col, row)) {
      const adj = adjacentWalkable(spot.col, spot.row);
      if (adj) { col = adj.col; row = adj.row; }
      else return;
    }
    a.tx = col * TILE + TILE / 2;
    a.ty = row * TILE + TILE;
    a.purpose = 'meeting';
    a.wanderTimer = 6 + Math.random() * 3; // stay a bit before next wander
  });
  addFeed('Office', '🤝 huddle @ ' + spot.name + ' — ' + attendees.map(i => agents[i].name).join(', '), '#ffcc00');
}

// Camera: offsets to center the office

function centerCam() {
  const offW = COLS * S, offH = ROWS * S;
  camX = Math.max(0, (offW - canvas.width) / 2);
  camY = Math.max(0, (offH - canvas.height) / 2);

// Click handling — click an agent to trigger a "wave hello" chat bubble & log
let focusedAgentId = null;
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Find nearest agent by screen distance
  let best = null, bestDist = 48;
  for (const d of DEFS) {
    const a = agents[d.id];
    const ax = a.wx * ZOOM - camX;
    const ay = a.wy * ZOOM - camY - CHAR_H * ZOOM / 2;
    const dist = Math.hypot(mx - ax, my - ay);
    if (dist < bestDist) { best = d.id; bestDist = dist; }
  }
  if (best) {
    const a = agents[best];
    a.chatMsg = 'hey John!';
    a.chatTimer = 2.5;
    a.dir = DIR_DOWN; a.flip = false;
    focusedAgentId = best;
    addFeed(a.name, '👋 waves at you', a.color);
    // Highlight sidebar card
    document.querySelectorAll('.ac').forEach(el => el.classList.toggle('focus', el.id === 'card-' + best));
    // Open inspector panel for this agent
    window.dispatchEvent(new CustomEvent('agent-click', { detail: { id: best } }));

    focusedAgentId = null;
    document.querySelectorAll('.ac').forEach(el => el.classList.remove('focus'));

});

// Pre-built offscreen canvases for each character frame (keyed by "si_row_frame_flip")
const frameCache = {};
function getFrame(si, row, frame, flip) {
  const key = `${si}_${row}_${frame}_${flip?1:0}`;
  if (frameCache[key]) return frameCache[key];
  const img = imgs[`ch${si % 6}`];
  if (!img || !img.complete || !img.naturalWidth) return null;
  const oc = document.createElement('canvas');
  oc.width = CHAR_W * ZOOM;
  oc.height = CHAR_H * ZOOM;
  const oc2 = oc.getContext('2d');
  oc2.imageSmoothingEnabled = false;
  if (flip) {
    oc2.translate(CHAR_W * ZOOM, 0);
    oc2.scale(-1, 1);
  }
  oc2.drawImage(img,
    frame * CHAR_W, row * CHAR_H, CHAR_W, CHAR_H,
    0, 0, CHAR_W * ZOOM, CHAR_H * ZOOM
  );
  frameCache[key] = oc;
  return oc;
}

function drawFloor() {
  const keys = ['f0','f1','f2','f3'];
  for (let r = 1; r < ROWS-1; r++) {
    for (let c = 1; c < COLS-1; c++) {
      const x = c*S - camX, y = r*S - camY;
      if (x < -S || y < -S || x > canvas.width+S || y > canvas.height+S) continue;
      const k = keys[(c*3 + r*7) % keys.length];
      const img = imgs[k] || imgs['f0'];
      if (img && img.complete) ctx.drawImage(img, 0,0,16,16, x,y,S,S);
    }
  }
  // Zone rugs — semi-transparent team-color overlays with dashed border
  ZONES.forEach(z => {
    const x = z.c0*S - camX, y = z.r0*S - camY;
    const w = (z.c1 - z.c0 + 1)*S, h = (z.r1 - z.r0 + 1)*S;
    ctx.fillStyle = z.tint;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = z.border;
    ctx.lineWidth = 1;
    ctx.setLineDash([S/6, S/4]);
    ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
    ctx.setLineDash([]);
  });
  // Entrance doormat (bottom-center)
  const doorC = Math.floor(COLS/2) - 1;
  const doorX = doorC*S - camX, doorY = (ROWS-2)*S - camY;
  ctx.fillStyle = 'rgba(233,69,96,0.15)';
  ctx.fillRect(doorX, doorY, S*2, S);
  ctx.strokeStyle = 'rgba(233,69,96,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(doorX + 2, doorY + 2, S*2 - 4, S - 4);
}

// Uses the pixel-agents wall sprite — 16×32 piece: upper 16px is the 3D face
// (extends above the tile), lower 16px is the floor-level base.
function drawWalls() {
  const img = imgs['wall'];
  if (!img || !img.complete) return;

  // Pick the "flat center" tile from the 4×4 auto-tile grid (bitmask ~7)
  // Each piece in walls.png is 16w × 32h.
  const SW = 16, SH = 32;
  const bmCol = 3, bmRow = 1; // roughly a flat horizontal piece
  const sx = bmCol * SW, sy = bmRow * SH;

  // Helper: draw one wall tile with its 3D face extending up by 1 tile
  const drawWall = (c, r) => {
    // Sprite is 32px tall → scaled = S*2, draw so bottom aligns with tile's bottom
    ctx.drawImage(img, sx, sy, SW, SH,
      c*S - camX, (r-1)*S - camY, S, S*2);
  };

  // Top wall (row 0) — 3D face extends "up" off-screen, which is fine
  for (let c = 0; c < COLS; c++) drawWall(c, 0);
  // Floor-level shadow cast by the back wall
  for (let c = 0; c < COLS; c++) {
    const g = ctx.createLinearGradient(0, S-camY, 0, S+12-camY);
    g.addColorStop(0,'rgba(0,0,0,.55)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(c*S-camX, S-camY, S, 12);
  }
  // Side walls (left + right)
  for (let r = 1; r < ROWS; r++) {
    drawWall(0, r);
    drawWall(COLS-1, r);
  }
  // Bottom wall
  for (let c = 1; c < COLS-1; c++) drawWall(c, ROWS-1);
}

// ── Characters — correct pixel-agents rendering ──────────────────────────────
// pixel-agents anchors characters at BOTTOM-CENTER in world coords
// Walk: 4 frames (cols 0-3), Idle: frame 1, Typing: frames 0-1 cols 4-5

const WALK_SPEED = 48; // px/sec (matches pixel-agents WALK_SPEED_PX_PER_SEC)
let lastTime = 0;

// Footstep dust particles — spawned when agents walk
const particles = [];
function spawnDust(sx, sy, color) {
  particles.push({
    x: sx + (Math.random() - 0.5) * 6,
    y: sy - 2,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -0.2 - Math.random() * 0.2,
    life: 0.6 + Math.random() * 0.3,
    age: 0,
    size: 1.5 + Math.random() * 1.5,
    color,
  });
}
function drawParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.life) { particles.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    const alpha = 1 - p.age / p.life;
    ctx.fillStyle = p.color + Math.floor(alpha * 140).toString(16).padStart(2, '0');
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  }
}

function drawAgents(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;

  // Meetings: occasionally summon a group of buddies to a landmark
  tryStartMeeting(dt);

  // Proximity gossip — when two non-busy agents pass within 1.5 tiles of each
  // other, pop a quick line above their heads.
  for (let i = 0; i < DEFS.length; i++) {
    const a1 = agents[DEFS[i].id];
    if (a1.busy || a1.chatMsg) continue;
    for (let j = i + 1; j < DEFS.length; j++) {
      const a2 = agents[DEFS[j].id];
      if (a2.busy || a2.chatMsg) continue;
      const d2 = Math.hypot(a1.wx - a2.wx, a1.wy - a2.wy);
      if (d2 < TILE * 1.5 && Math.random() < 0.01) {
        a1.chatMsg = pickChatter(DEFS[i].id, DEFS[j].id);
        a1.chatTimer = 2;
        a2.chatMsg = Math.random() < 0.5 ? 'yeah' : 'got it';
        a2.chatTimer = 1.6;
        addFeed(DEFS[i].name, '→ ' + DEFS[j].name + ': ' + a1.chatMsg, DEFS[i].color);
        break;
      }
    }
  }

  // Sort by world Y (bottom coord) for proper depth order
  const sorted = [...DEFS].sort((a,b) => agents[a.id].wy - agents[b.id].wy);

  sorted.forEach(d => {
    const a = agents[d.id];

    // ── Movement ──────────────────────────────────────────────────────────
    const dx = a.tx - a.wx, dy = a.ty - a.wy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const moving = dist > 0.5;

    if (moving) {
      const step = Math.min(WALK_SPEED * dt, dist);
      a.wx += (dx/dist) * step;
      a.wy += (dy/dist) * step;

      // Ambient "thinking while walking" bubble — very occasional
      if (!a.chatMsg && Math.random() < 0.003) {
        a.chatMsg = pickWalkingThought(d.id);
        a.chatTimer = 1.8;
      }

      // Direction from movement delta
      if (Math.abs(dx) > Math.abs(dy)) {
        a.dir = DIR_RIGHT;
        a.flip = dx < 0; // left = flipped right
      } else {
        a.dir = dy > 0 ? DIR_DOWN : DIR_UP;
        a.flip = false;
      }

      // Walk cycle — pixel-agents frames 0,1,2,1 (3 frames, ping-pong)
      a.frameTimer += dt;
      if (a.frameTimer > 0.14) {
        a.frameTimer = 0;
        a.walkStep = (a.walkStep + 1) % 4;
        // pattern: 0, 1, 2, 1
        a.frame = [0, 1, 2, 1][a.walkStep];
        // Dust on foot-down frames (0 and 2)
        if (a.frame === 0 || a.frame === 2) {
          const px = Math.round(a.wx * ZOOM - camX);
          const py = Math.round(a.wy * ZOOM - camY);
          spawnDust(px, py, '#9a8a70');
        }
      }
      a.pausedAt = 0;
    } else {
      // Standing still — pick an idle / typing / reading animation frame.
      // Typing/reading plays ONLY when the agent happens to be at their desk
      // during a rest cycle. Otherwise (paused mid-wander, at break area,
      // standing next to a buddy) they show the idle stance.
      const atDesk = Math.abs(a.wx - a.deskX) < 2 && Math.abs(a.wy - a.deskY) < 2;

      if (a.busy && atDesk && (a.purpose === 'rest' || a.purpose === null)) {
        a.frameTimer += dt;
        if (a.frameTimer > 0.22) {
          a.frameTimer = 0;
          const readingTools = a.action === 'use_tool' && /read|grep|fetch|search/i.test(a.thought || '');
          if (readingTools) {
            a.frame = a.frame === 5 ? 6 : 5;
          } else {
            a.frame = a.frame === 3 ? 4 : 3;
          }
        }
        a.dir = DIR_DOWN;
        a.flip = false;
      } else {
        a.frame = 1;
        a.frameTimer = 0;
      }
      a.pausedAt += dt;

      // Tick chat bubble timer
      if (a.chatTimer > 0) {
        a.chatTimer -= dt;
        if (a.chatTimer <= 0) a.chatMsg = null;
      }

      // ── Wander behavior — runs UNCONDITIONALLY. Agents roam the office
      // regardless of server-reported busy state. The `busy` flag only
      // affects bubble text and the at-desk typing animation. This way the
      // office stays alive even when every agent is mid-Ollama-think.
      {
        // On arrival at wander target — trigger "interaction" event
        if (a.purpose === 'visit' && a.visiting) {
          const buddy = agents[a.visiting];
          if (buddy) {
            a.chatMsg = pickChatter(d.id, a.visiting);
            a.chatTimer = 2.4;
            const bdx = buddy.wx - a.wx;
            if (Math.abs(bdx) > 1) { a.dir = DIR_RIGHT; a.flip = bdx < 0; }
            else a.dir = buddy.wy > a.wy ? DIR_DOWN : DIR_UP;
            if (!buddy.chatMsg) {
              buddy.chatMsg = 'noted';
              buddy.chatTimer = 1.8;
              const bdx2 = a.wx - buddy.wx;
              if (Math.abs(bdx2) > 1) { buddy.dir = DIR_RIGHT; buddy.flip = bdx2 < 0; }
              else buddy.dir = a.wy > buddy.wy ? DIR_DOWN : DIR_UP;
            }
            addFeed(d.name, '→ ' + buddy.name + ': ' + a.chatMsg, d.color);
          }
          a.purpose = null;
          a.visiting = null;
        }

        a.wanderTimer -= dt;
        if (a.wanderTimer <= 0) {
          if (a.wanderCount >= a.wanderLimit) {
            // Rest cycle — return to desk briefly then roam again
            a.tx = a.deskX; a.ty = a.deskY;
            a.purpose = 'rest';
            a.wanderCount = 0;
            a.wanderLimit = 6 + Math.floor(Math.random() * 5);
            a.wanderTimer = 2 + Math.random() * 2.5; // rest 2-4.5s
          } else {
            const t = pickWanderTarget(a);
            a.tx = t.tx; a.ty = t.ty;
            a.purpose = t.purpose;
            a.visiting = t.visiting || null;
            a.wanderCount++;
            // Short dwell between wanders so they keep moving
            a.wanderTimer = 0.8 + Math.random() * 1.6;
          }
        }
      }
    }

    // ── Screen position (bottom-center anchor, matching pixel-agents) ─────
    const sx = Math.round(a.wx * ZOOM - camX);
    const sy = Math.round(a.wy * ZOOM - camY); // bottom of character

    // Skip if way offscreen
    if (sx < -S*3 || sy < -S*3 || sx > canvas.width+S*3 || sy > canvas.height+S*3) return;

    // Idle bob offset (visual only)
    const bob = moving ? 0 : Math.sin(ts * 0.002 + a.bobPhase) * 1.5;

    // ── Draw character sprite ─────────────────────────────────────────────
    const frame = getFrame(d.si, a.dir, a.frame, a.flip);
    const charW = CHAR_W * ZOOM; // 48px
    const charH = CHAR_H * ZOOM; // 96px

    // Sitting offset — when typing/reading at desk, shift down so the
    // character visually sits in their chair (matches pixel-agents).
    const isTyping = a.frame >= 3 && a.frame <= 6;
    const sitOffset = isTyping ? 6 * ZOOM : 0;

    if (frame) {
      // Draw at (sx - charW/2, sy - charH + bob + sitOffset)
      ctx.drawImage(frame, sx - charW/2, sy - charH + bob + sitOffset);
    } else {
      // Fallback circle (shown before sprites load)
      ctx.beginPath();
      ctx.arc(sx, sy - charH/2 + bob, S/2, 0, Math.PI*2);
      ctx.fillStyle = d.color + '33';
      ctx.fill();
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // ── Glow ring when busy ───────────────────────────────────────────────
    if (a.busy) {
      const pulse = 0.5 + 0.5 * Math.sin(ts * 0.005);
      ctx.beginPath();
      ctx.arc(sx, sy - charH/2 + bob, charW/2 + 4 + pulse*3, 0, Math.PI*2);
      ctx.strokeStyle = d.color + Math.floor(60 + pulse*80).toString(16).padStart(2,'0');
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // ── Name label (above head) ───────────────────────────────────────────
    ctx.font = 'bold 9px "Courier New", monospace';
    ctx.textAlign = 'center';
    const nameY = sy - charH - 4 + bob;
    ctx.fillStyle = 'rgba(0,0,0,.8)';
    const tw = ctx.measureText(d.name).width;
    ctx.fillRect(sx - tw/2 - 3, nameY - 10, tw + 6, 12);
    ctx.fillStyle = d.color;
    ctx.fillText(d.name, sx, nameY);

    // ── Action indicator ──────────────────────────────────────────────────
    if (a.action !== 'idle') {
      ctx.font = '13px serif';
      ctx.fillText(a.action==='work'?'⚙️':a.action==='talk'?'💬':'🔍',
        sx, sy - charH - 18 + bob);
    }

    // ── Thought / chat bubble ─────────────────────────────────────────────
    let bubbleTxt = null;
    if (a.chatMsg) bubbleTxt = a.chatMsg;
    else if (a.busy && a.thought && a.thought !== '...') bubbleTxt = a.thought;

    if (bubbleTxt) {
      const txt = bubbleTxt.length > 30 ? bubbleTxt.slice(0,27)+'…' : bubbleTxt;
      ctx.font = '9px "Courier New",monospace';
      ctx.textAlign = 'center';
      const bw = Math.min(ctx.measureText(txt).width + 10, 170);
      const bx = sx - bw/2, by = sy - charH - 36 + bob;
      ctx.fillStyle = 'rgba(8,8,24,.92)';
      ctx.strokeStyle = d.color + 'aa';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, 14, 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = d.color + 'dd';
      ctx.fillText(txt, sx, by + 11);
      // Tail pointing to character head
      ctx.fillStyle = 'rgba(8,8,24,.92)';
      ctx.beginPath();
      ctx.moveTo(sx - 3, by + 14);
      ctx.lineTo(sx + 3, by + 14);
      ctx.lineTo(sx, by + 18);
      ctx.closePath();
      ctx.fill();
    }
  });
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('alist');
  if (list.children.length) return;

  // Group agents by their `group` field, preserving DEFS order
  const byGroup = [];
  DEFS.forEach(d => {
    let bucket = byGroup.find(g => g.name === d.group);
    if (!bucket) { bucket = {name: d.group, items: []}; byGroup.push(bucket); }
    bucket.items.push(d);
  });

  const groupColors = {Strategy:'#4fc3f7', Business:'#81c784', Wellness:'#ef9a9a'};

  byGroup.forEach(g => {
    const hdr = document.createElement('div');
    hdr.className = 'grp';
    hdr.style.setProperty('--c', groupColors[g.name] || '#e94560');
    hdr.innerHTML = `<span>${g.name}</span><span class="grp-c">${g.items.length}</span>`;
    list.appendChild(hdr);

    g.items.forEach(d => {
      const card = document.createElement('div');
      card.className = 'ac';
      card.id = 'card-' + d.id;
      card.style.setProperty('--c', d.color);
      card.innerHTML =
        `<div class="an"><span class="an-e">${d.emoji}</span><span>${d.name}</span></div>` +
        `<div class="at" id="th-${d.id}">idle</div>` +
        `<div class="as"><span class="ad" id="dt-${d.id}"></span>` +
        `<span class="aa" id="ac-${d.id}">idle</span></div>`;
      card.addEventListener('click', () => {
        const a = agents[d.id];
        a.chatMsg = 'on it, John!';
        a.chatTimer = 2.5;
        a.tx = a.deskX; a.ty = a.deskY;
        focusedAgentId = d.id;
        addFeed(a.name, '📣 pinged by you', a.color);
        document.querySelectorAll('.ac').forEach(el => el.classList.toggle('focus', el.id === 'card-' + d.id));
      });
      list.appendChild(card);
    });
  });
}

function updateCard(id) {
  const a = agents[id];
  const card = document.getElementById('card-' + id);
  const th = document.getElementById('th-' + id);
  const dt = document.getElementById('dt-' + id);
  const ac = document.getElementById('ac-' + id);
  if (!card) return;
  card.className = 'ac' + (a.busy ? ' on' : '');
  if (th) th.textContent = a.thought || '...';
  if (dt) dt.className = 'ad ' + (a.action || '');
  if (ac) ac.textContent = a.action || 'idle';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function addFeed(who, txt, color) {
  const log = document.getElementById('panel-feed');
  const d = document.createElement('div');
  d.className = 'fm';
  d.innerHTML = `<span class="fw" style="color:${color||'#e94560'}">${escapeHtml(who)}</span>` +
    `<span class="fx">: ${escapeHtml(String(txt).slice(0, 80))}</span>`;
  log.prepend(d);
  while (log.children.length > 80) log.lastChild.remove();
}

// ── Tab switching ────────────────────────────────────────────────────────────
document.addEventListener('click', (e) => {
  const t = e.target.closest('.tab');
  if (!t) return;
  document.querySelectorAll('.tab').forEach((el) => el.classList.toggle('on', el === t));
  const which = t.dataset.tab;
  ['feed','proposals','portfolio'].forEach((name) => {
    const p = document.getElementById('panel-' + name);
    p.classList.toggle('on', name === which);
  });
});

// ── Proposals ────────────────────────────────────────────────────────────────
const pendingProposals = new Map();

function renderProposals() {
  const panel = document.getElementById('panel-proposals');
  const badge = document.getElementById('prop-badge');
  const list = Array.from(pendingProposals.values()).sort((a,b) => b.createdAt.localeCompare(a.createdAt));
  badge.textContent = String(list.length);
  badge.classList.toggle('zero', list.length === 0);
  if (list.length === 0) {
    panel.classList.add('empty');
    panel.innerHTML = 'No pending proposals.<br><br>Click ✨ Spark Evolution to ask agents to suggest improvements.';
    return;
  }
  panel.classList.remove('empty');
  panel.innerHTML = list.map((p) => {
    const payload = JSON.stringify(p.payload, null, 2).slice(0, 280);
    return `<div class="prop" data-id="${escapeHtml(p.id)}">
      <div class="prop-h"><span>${escapeHtml(p.kind)}</span><span class="prop-by">${escapeHtml(p.proposedByName)}</span></div>
      <div class="prop-r">${escapeHtml(p.reason || '(no reason given)')}</div>
      <pre class="prop-p">${escapeHtml(payload)}</pre>
      <div class="prop-btns">
        <button class="prop-btn ok" data-act="ok">Approve</button>
        <button class="prop-btn no" data-act="no">Reject</button>
      </div>
    </div>`;
  }).join('');
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.prop-btn');
  if (!btn || !room) return;
  const id = btn.closest('.prop').dataset.id;
  const act = btn.dataset.act;
  if (act === 'ok') room.send('approve-proposal', { id });
  else room.send('reject-proposal', { id });
  // Optimistically remove — server will broadcast proposal-resolved either way.
  pendingProposals.delete(id);
  renderProposals();
});

// ── Portfolio ────────────────────────────────────────────────────────────────
function renderPortfolio(items) {
  const panel = document.getElementById('panel-portfolio');
  if (!items || items.length === 0) {
    panel.classList.add('empty');
    panel.innerHTML = 'No portfolio items yet.<br><br>Drop a resume.md into <code>/context</code>.';
    return;
  }
  panel.classList.remove('empty');
  panel.innerHTML = items.slice(0, 30).map((it) => `
    <div class="port">
      <div class="port-t">${escapeHtml(it.title || 'Untitled')}</div>
      <div class="port-d">${escapeHtml(String(it.detail || '').slice(0, 220))}</div>
    </div>
  `).join('');
}

// ── Chat input ───────────────────────────────────────────────────────────────
function sendChat() {
  const input = document.getElementById('chat-in');
  const text = input.value.trim();
  if (!text || !room) return;
  room.send('chat', { text });
  input.value = '';
}
document.getElementById('chat-send').addEventListener('click', sendChat);
document.getElementById('chat-in').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendChat();
});

// ── Evolution button ─────────────────────────────────────────────────────────
document.getElementById('evo').addEventListener('click', () => {
  if (!room) return;
  room.send('request-evolution', {});
  const btn = document.getElementById('evo');
  btn.disabled = true;
  btn.textContent = '✨ Sparking...';
  setTimeout(() => { btn.disabled = false; btn.textContent = '✨ Spark Evolution'; }, 4000);
});

// ── Colyseus ─────────────────────────────────────────────────────────────────
let room = null;
function connect() {
  if (typeof Colyseus === 'undefined') { setTimeout(connect, 300); return; }
  const client = new Colyseus.Client(WS);
  client.joinOrCreate('office').then(r => {
    room = r;
    document.getElementById('cdot').className = 'on';
    document.getElementById('ctxt').textContent = '12 agents online';
    addFeed('System', 'Connected', '#00ff88');

    r.state.agents.onAdd((agent, agentId) => {
      if (!agents[agentId]) return;
      agent.onChange(() => {
        const a = agents[agentId];
        a.action = agent.action || 'idle';
        a.thought = agent.thought || '...';
        a.busy = a.action !== 'idle';
        // Server state only drives thought text, action icon and the busy
        // flag. It NEVER overrides tx/ty — the client-side wander loop is
        // the sole authority on where agents walk. Otherwise incoming think
        // ticks would yank them back to their desks every few seconds.
        updateCard(agentId);
      });
    });

    r.onMessage('chat', msg => {
      const d = DEFS.find(x => x.name.toLowerCase() === (msg.sender || '').toLowerCase());
      addFeed(msg.sender, msg.text, d ? d.color : '#e94560');
    });

    // Phase 3 — proposals, portfolio, discoveries
    r.onMessage('portfolio-state', (m) => renderPortfolio(m.items || []));
    r.onMessage('proposal-pending', (p) => {
      pendingProposals.set(p.id, p);
      renderProposals();
      addFeed('🛠️ ' + p.proposedByName, 'proposes ' + p.kind, '#ffcc00');
    });
    r.onMessage('proposal-resolved', (m) => {
      pendingProposals.delete(m.id);
      renderProposals();
    });
    r.onMessage('proposals-state', (m) => {
      pendingProposals.clear();
      (m.pending || []).forEach((p) => pendingProposals.set(p.id, p));
      renderProposals();
    });
    r.onMessage('discovery', (m) => {
      addFeed('💡 ' + m.agentName, m.note, '#aa88ff');
      const id = m.agentId;
      agentDiscoveries[id] = (agentDiscoveries[id] || []).concat(m.note).slice(-12);
      if (inspectedId === id) showInspector(id); // refresh
    });

    // Genesis (meta-feature) state
    r.onMessage('proposal-pending', () => { genesisState.proposals++; renderGenesis(); });
    r.onMessage('proposal-resolved', (m) => {
      if (m.status === 'approved') genesisState.applied++;
      else if (m.status === 'rejected') genesisState.rejected++;
      renderGenesis();
    });
    r.onMessage('genesis-state', (m) => {
      if (typeof m.charter === 'string') genesisState.charter = m.charter;
      if (typeof m.paused === 'boolean') genesisState.paused = m.paused;
      if (Array.isArray(m.history)) genesisState.history = m.history;
      if (typeof m.applied === 'number') genesisState.applied = m.applied;
      if (typeof m.rejected === 'number') genesisState.rejected = m.rejected;
      if (typeof m.proposals === 'number') genesisState.proposals = m.proposals;
      renderGenesis();
    });
    r.onMessage('genesis-history', (m) => {
      genesisState.history = m.history || [];
      renderGenesis();
    });
    r.onMessage('genesis-vote', (m) => {
      const arr = genesisState.votes.get(m.proposalId) || [];
      arr.push({ by: m.by, vote: m.vote, reason: m.reason });
      genesisState.votes.set(m.proposalId, arr);
      renderGenesis();
    });
    r.onMessage('genesis-charter', (m) => {
      genesisState.charter = m.charter;
      renderGenesis();
    });
    r.onMessage('genesis-rollback', (m) => {
      const h = genesisState.history.find((x) => x.id === m.id);
      if (h) { h.rolledBack = true; renderGenesis(); }
    });
    // Layout-change broadcasts. office.html generates its own layout
    // client-side, so we just surface them as feed entries for now.
    r.onMessage('layout-add', (m) => addFeed('Office', `+ ${m.type} @ (${m.x},${m.y})`, '#00ff88'));
    r.onMessage('layout-move', (m) => addFeed('Office', `move ${m.uid} → (${m.toX},${m.toY})`, '#00ff88'));
    r.onMessage('layout-expand', (m) => addFeed('Office', `expand ${m.direction} +${m.amount}`, '#00ff88'));

    // Bootstrap state on connect
    r.send('request-portfolio');
    r.send('request-proposals');
    r.send('request-genesis');

    r.onLeave(() => {
      document.getElementById('cdot').className = '';
      document.getElementById('ctxt').textContent = 'Reconnecting...';
      setTimeout(connect, 3000);
    });
  }).catch(() => setTimeout(connect, 3000));
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let pcTick = 0, tick = 0;
const DEBUG = new URLSearchParams(window.location.search).get('debug') === '1';
let dbgFps = 0, dbgFrames = 0, dbgAcc = 0;

const BOOT_TS = Date.now();
const BUILD = 'v7-always-wander';
function render(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Only show the loading screen for up to 3 seconds. After that, force the
  // render loop to run even if an image failed to load — fallback circles
  // and emoji will stand in for any missing sprites, so the office is never
  // permanently frozen on "LOADING".
  const bootElapsed = (Date.now() - BOOT_TS) / 1000;
  if (!assetsReady() && bootElapsed < 3) {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const pct = Math.floor(loaded / totalAssets * 100);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 12px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('LOADING SPRITES ' + pct + '%', canvas.width/2, canvas.height/2 - 10);
    ctx.fillStyle = '#1a1a3a';
    ctx.fillRect(canvas.width/2 - 100, canvas.height/2 + 5, 200, 8);
    ctx.fillStyle = '#e94560';
    ctx.fillRect(canvas.width/2 - 100, canvas.height/2 + 5, pct * 2, 8);
    requestAnimationFrame(render);
    return;
  }

  pcTick++;
  const dt = (ts - (render._ts || ts)) / 1000;
  render._ts = ts;
  dbgAcc += dt; dbgFrames++;
  if (dbgAcc >= 0.5) { dbgFps = dbgFrames / dbgAcc; dbgFrames = 0; dbgAcc = 0; }
  drawFloor();
  drawWalls();
  drawFurniture(pcTick);
  drawAgents(ts);
  // Draw dust particles above furniture, below overlays
  const pdt = Math.min((ts - (render._lastTs || ts)) / 1000, 0.1);
  render._lastTs = ts;
  drawParticles(pdt);

  // Vignette
  const vg = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height * 0.25,
    canvas.width/2, canvas.height/2, canvas.height * 0.85
  );
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < canvas.height; y += 3) ctx.fillRect(0, y, canvas.width, 1);

  // Build version badge (bottom-left) — proves the new code reached the browser
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(8, canvas.height - 22, 130, 16);
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 10px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText('BUILD ' + BUILD, 14, canvas.height - 10);

  tick++;
  if (tick % 60 === 0) {
    const active = DEFS.filter(d => agents[d.id].busy).length;
    document.getElementById('active').textContent = active;
    document.getElementById('tk').textContent = '⏱ ' + tick;
  }

  // Debug overlay — enable with ?debug=1 in the URL
  if (DEBUG) {
    const a0 = agents[DEFS[0].id];
    const moving = Math.hypot(a0.tx - a0.wx, a0.ty - a0.wy) > 0.5;
    ctx.fillStyle = 'rgba(0,0,0,.75)';
    ctx.fillRect(8, 8, 320, 70);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 11px "Courier New"';
    ctx.textAlign = 'left';
    ctx.fillText('DEBUG  tick=' + tick + '  fps=' + (dbgFps|0), 14, 24);
    ctx.fillText(DEFS[0].id + '  wx=' + a0.wx.toFixed(1) + ' tx=' + a0.tx.toFixed(1) +
      '  mv=' + (moving?'Y':'N'), 14, 40);
    ctx.fillText('wTimer=' + a0.wanderTimer.toFixed(2) + '  busy=' + a0.busy +
      '  purpose=' + (a0.purpose||'-'), 14, 56);
    ctx.fillText('assets=' + loaded + '/' + totalAssets +
      '  room=' + (room ? 'on' : 'off'), 14, 72);
  }

  requestAnimationFrame(render);
}

// ── Floating panel framework (vanilla port of root prototype) ────────────────
const _panels = new Map();

function createFloatingPanel({ id, title, icon, accent, defaultX, defaultY, width = 280, hidden = true }) {
  const root = document.getElementById('app');
  const el = document.createElement('div');
  el.className = 'fp';
  el.style.setProperty('--accent', accent || '#e94560');
  el.style.width = width + 'px';
  el.style.zIndex = String(50 + _panels.size);

  // Restore position from localStorage
  const sk = 'panel:' + id;
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(sk) || '{}'); } catch (e) {}
  el.style.left = (saved.x ?? defaultX ?? Math.max(8, window.innerWidth - width - 24)) + 'px';
  el.style.top = (saved.y ?? defaultY ?? 50) + 'px';
  if (saved.hidden === false) hidden = false;
  el.style.display = hidden ? 'none' : 'flex';

  el.innerHTML = `
    <div class="fp-head">
      <div class="fp-title"><span class="fp-icon">${icon || ''}</span><span>${escapeHtml(title)}</span></div>
      <div class="fp-actions">
        <button class="fp-btn" data-act="min" title="Collapse">–</button>
        <button class="fp-btn" data-act="x" title="Close">×</button>
      </div>
    </div>
    <div class="fp-body" data-body></div>
  `;
  root.appendChild(el);

  // Drag (head only, ignoring buttons)
  let drag = null;
  const head = el.querySelector('.fp-head');
  head.addEventListener('mousedown', (e) => {
    if (e.target.closest('button')) return;
    drag = { dx: e.clientX - el.offsetLeft, dy: e.clientY - el.offsetTop };
    el.style.zIndex = String(100 + _panels.size);
  });
  window.addEventListener('mousemove', (e) => {
    if (!drag) return;
    const x = Math.max(8, Math.min(window.innerWidth - width - 8, e.clientX - drag.dx));
    const y = Math.max(8, Math.min(window.innerHeight - 44, e.clientY - drag.dy));
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = null;
    persist();
  });

  // Buttons
  let isMin = false;
  el.querySelector('[data-act="min"]').addEventListener('click', () => {
    isMin = !isMin;
    el.querySelector('[data-body]').classList.toggle('min', isMin);
    el.querySelector('[data-act="min"]').textContent = isMin ? '+' : '–';
  });
  el.querySelector('[data-act="x"]').addEventListener('click', () => api.hide());

  function persist() {
    localStorage.setItem(sk, JSON.stringify({ x: el.offsetLeft, y: el.offsetTop, hidden: el.style.display === 'none' }));
  }

  const api = {
    el,
    body: el.querySelector('[data-body]'),
    show() { el.style.display = 'flex'; persist(); updateChip(id, true); },
    hide() { el.style.display = 'none'; persist(); updateChip(id, false); },
    toggle() { el.style.display === 'none' ? api.show() : api.hide(); },
    setBody(html) { api.body.innerHTML = html; },
  };
  _panels.set(id, api);
  updateChip(id, !hidden);
  return api;
}

function updateChip(id, on) {
  const c = document.querySelector(`.chip[data-pn="${id}"]`);
  if (c) c.classList.toggle('on', on);
}

document.querySelectorAll('.chip').forEach((c) => {
  c.addEventListener('click', () => {
    const p = _panels.get(c.dataset.pn);
    if (p) p.toggle();
  });
});

// ── Inspector panel ──────────────────────────────────────────────────────────
const inspector = createFloatingPanel({
  id: 'inspector', title: 'Agent Inspector', icon: '🔍', accent: '#4fc3f7',
  width: 280, defaultX: 24, defaultY: 50, hidden: true,
});
inspector.setBody('<div style="color:#444;text-align:center;padding:20px 0">Click an agent to inspect.</div>');

let inspectedId = null;
function showInspector(agentId) {
  const def = DEFS.find((d) => d.id === agentId);
  if (!def) return;
  inspectedId = agentId;
  const a = agents[agentId] || {};
  const action = a.action || 'idle';
  const thought = a.thought || '...';
  const memList = (agentMemories[agentId] || []).slice(-8).map((m) => `<li>${escapeHtml(m)}</li>`).join('');
  const discList = (agentDiscoveries[agentId] || []).slice(-6).map((d) => `<li>${escapeHtml(d)}</li>`).join('');
  inspector.body.style.setProperty('--c', def.color);
  inspector.setBody(`
    <div class="ai-name" style="color:${def.color}">${escapeHtml(def.name)}</div>
    <div class="ai-role">${escapeHtml(def.role || def.group || '')}</div>
    <div class="ai-row"><span>action</span><b>${escapeHtml(action)}</b></div>
    <div class="ai-row"><span>position</span><b>(${a.tx?.toFixed?.(1) || '?'}, ${a.ty?.toFixed?.(1) || '?'})</b></div>
    <div class="ai-row"><span>thought</span><b style="font-style:italic;color:#888">${escapeHtml(thought.slice(0, 60))}</b></div>
    <div class="ai-section">
      <div class="gen-h" style="color:${def.color}">Recent memories</div>
      <ul class="ai-list">${memList || '<li style="color:#444">none yet</li>'}</ul>
    </div>
    <div class="ai-section">
      <div class="gen-h" style="color:#aa88ff">Discoveries</div>
      <ul class="ai-list">${discList || '<li style="color:#444">none yet</li>'}</ul>
    </div>
    <div class="ai-section">
      <button class="prop-btn ok" style="width:100%" onclick="if(room) room.send('request-evolution', { agentId: '${escapeHtml(agentId)}' })">✨ Ask this agent to propose</button>
    </div>
  `);
  inspector.show();
}

const agentMemories = {};
const agentDiscoveries = {};

// ── Genesis panel (meta-feature) ─────────────────────────────────────────────
const genesis = createFloatingPanel({
  id: 'genesis', title: 'Genesis · Evolution Log', icon: '🧬', accent: '#aa88ff',
  width: 320, defaultY: 50, hidden: true,
});

const genesisState = {
  charter: 'No charter yet. Agents will draft one as they evolve the office.',
  proposals: 0,
  applied: 0,
  rejected: 0,
  paused: false,
  history: [],   // { id, kind, by, reason, status, appliedAt, rolledBack }
  votes: new Map(), // proposalId -> [{ by, vote, reason }]
};

function renderGenesis() {
  const recent = genesisState.history.slice(-15).reverse();
  const rows = recent.map((h) => `
    <div class="gen-hist">
      <div class="h-t"><span style="color:${h.status==='applied'?'#7ee787':h.status==='rejected'?'#ff8888':'#888'}">[${escapeHtml(h.status)}]</span>
        <span class="by">${escapeHtml(h.by||'?')}</span> · ${escapeHtml(h.kind)} — ${escapeHtml(h.reason||'')}</div>
      ${h.status==='applied' && !h.rolledBack
        ? `<button class="h-r" onclick="if(room) room.send('rollback-proposal', { id: '${escapeHtml(h.id)}' })">undo</button>`
        : h.rolledBack ? '<button class="h-r done">undone</button>' : ''}
    </div>`).join('') || '<div style="color:#444;padding:10px 0;text-align:center">no history yet</div>';

  const votesHtml = Array.from(genesisState.votes.entries()).slice(-3).map(([pid, vs]) => `
    <div style="margin:4px 0;padding:4px 6px;background:#06060f;border-left:1px solid #aa88ff;font-size:9px">
      <div style="color:#888;margin-bottom:2px">prop ${escapeHtml(pid.slice(-6))} — ${vs.length} vote(s)</div>
      ${vs.map(v => `<div class="gen-vote"><span class="by">${escapeHtml(v.by)}</span>: <span class="${v.vote==='yes'?'yea':'nay'}">${v.vote}</span> — ${escapeHtml((v.reason||'').slice(0,60))}</div>`).join('')}
    </div>`).join('');

  genesis.setBody(`
    <div class="gen-section">
      <div class="gen-h">World Charter</div>
      <div class="gen-charter">${escapeHtml(genesisState.charter)}</div>
    </div>
    <div class="gen-section">
      <div class="gen-h">Stats</div>
      <div class="gen-stat"><span>proposed</span><b>${genesisState.proposals}</b></div>
      <div class="gen-stat"><span>applied</span><b style="color:#7ee787">${genesisState.applied}</b></div>
      <div class="gen-stat"><span>rejected</span><b style="color:#ff8888">${genesisState.rejected}</b></div>
      <div class="gen-stat"><span>history cap</span><b>50</b></div>
      <label class="gen-pause"><input type="checkbox" ${genesisState.paused?'checked':''} onchange="if(room) room.send('set-evolution-paused', { paused: this.checked })"> Pause evolution</label>
    </div>
    ${votesHtml ? `<div class="gen-section"><div class="gen-h">Recent votes</div>${votesHtml}</div>` : ''}
    <div class="gen-section">
      <div class="gen-h">History (last 15)</div>
      ${rows}
    </div>
  `);
}
renderGenesis();

// Hook the existing agent click handler so clicking an agent opens inspector.
// Click handling already exists earlier in the file (canvas mousedown);
// see the addFeed('waves at you') flow — augment via a window-level event.
window.addEventListener('agent-click', (e) => showInspector(e.detail.id));

// ── Boot ──────────────────────────────────────────────────────────────────────
buildSidebar();
requestAnimationFrame(render);
</script>
<script src="https://cdn.jsdelivr.net/npm/colyseus.js@0.15.19/dist/colyseus.js"
  onload="connect()" onerror="setTimeout(connect,1000)"></script>
</body>
</html>
